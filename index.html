    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        // Force immediate SW update check on every page load
        navigator.serviceWorker.ready.then(function (reg) { reg.update().catch(function () {}) })
        // Reload page when new SW takes over (postMessage = iOS-safe, controllerchange = fallback)
        var _swRefreshing = false
        function _swDoReload() {
          if (!_swRefreshing) { _swRefreshing = true; window.location.reload() }
        }
        navigator.serviceWorker.addEventListener('message', function (e) {
          if (e.data && e.data.type === 'SW_RELOAD') { _swDoReload() }
        })
        navigator.serviceWorker.addEventListener('controllerchange', _swDoReload)
      }
    </script>
  </body>
